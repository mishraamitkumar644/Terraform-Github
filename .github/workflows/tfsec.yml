name: "TFSec"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  tfsec:
    name: "TFSec (${{ inputs.environment }})"
    runs-on: [self-hosted, linux, terraform]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Run tfsec security scanner ────────────────────────────────────────
      # --format json produces machine-readable output for report publishing
      - name: TFSec Scan
        run: |
          tfsec . \
            --format json \
            --out tfsec-report.json \
            --no-color \
            --soft-fail          # Remove --soft-fail to hard-fail on findings

      # ── Upload security report artifact ───────────────────────────────────
      - name: Upload TFSec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfsec-report.json
          if-no-files-found: ignore
          retention-days: 7
