name: "TFSec"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  tfsec:
    name: "TFSec (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sL -o /usr/local/bin/tfsec \
            https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
          chmod +x /usr/local/bin/tfsec
          tfsec --version

      - name: TFSec Scan
        run: |
          tfsec . \
            --format json \
            --out tfsec-report.json \
            --no-color \
            --soft-fail

      - name: Upload TFSec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfsec-report.json
          if-no-files-found: ignore
          retention-days: 7
