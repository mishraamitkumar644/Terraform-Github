name: "Terrascan"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  terrascan:
    name: "Terrascan (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terrascan
        run: |
          curl -sL -o /usr/local/bin/terrascan \
            https://github.com/tenable/terrascan/releases/latest/download/terrascan_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin terrascan
          chmod +x /usr/local/bin/terrascan
          terrascan version

      - name: Terrascan
        run: |
          terrascan scan \
            -i terraform \
            -o json \
            --output-file terrascan-report.json \
            --non-recursive \
            || true

      - name: Upload Terrascan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terrascan-report-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/terrascan-report.json
          if-no-files-found: ignore
          retention-days: 7
