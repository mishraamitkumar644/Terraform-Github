name: "Terrascan"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  terrascan:
    name: "Terrascan (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Terrascan
        uses: tenable/terrascan-action@main
        with:
          iac_type: terraform
          iac_dir: ${{ inputs.working_directory }}
          non_recursive: true
          sarif_upload: false
        continue-on-error: true

      - name: Upload Terrascan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terrascan-report-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/terrascan-report.json
          if-no-files-found: ignore
          retention-days: 7
