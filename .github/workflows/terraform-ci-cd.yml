name: Terraform Enterprise Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      working_directory:
        description: "Terraform working directory (relative to repo root)"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read

jobs:

  # ── 1. INIT ───────────────────────────────────────────────────────────────
  init:
    name: "Init"
    uses: ./.github/workflows/terraform-init.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 2. VALIDATE ───────────────────────────────────────────────────────────
  validate:
    name: "Validate"
    needs: init
    uses: ./.github/workflows/terraform-validate.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 3a. TFLINT ───────────────────────────────────────────────────────────
  tflint:
    name: "TFLint"
    needs: validate
    uses: ./.github/workflows/tflint.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 3b. TFSEC ────────────────────────────────────────────────────────────
  tfsec:
    name: "TFSec"
    needs: validate
    uses: ./.github/workflows/tfsec.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 3c. TERRASCAN ────────────────────────────────────────────────────────
  terrascan:
    name: "Terrascan"
    needs: validate
    uses: ./.github/workflows/terrascan.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 3d. TERRAFORM TEST ───────────────────────────────────────────────────
  test:
    name: "Terraform Test"
    needs: validate
    uses: ./.github/workflows/terraform-test.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 4. PLAN ──────────────────────────────────────────────────────────────
  plan:
    name: "Plan"
    needs: [tflint, tfsec, terrascan, test]
    uses: ./.github/workflows/terraform-plan.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 5. PLAN TO JSON ──────────────────────────────────────────────────────
  plan-to-json:
    name: "Plan to JSON"
    needs: plan
    uses: ./.github/workflows/plan-to-json.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 6. OPA ───────────────────────────────────────────────────────────────
  opa:
    name: "OPA Policy Validation"
    needs: plan-to-json
    uses: ./.github/workflows/opa-validation.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 7. PUBLISH ───────────────────────────────────────────────────────────
  publish:
    name: "Publish Results"
    needs: opa
    uses: ./.github/workflows/publish-results.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 8. MANUAL APPROVAL ───────────────────────────────────────────────────
  approval:
    name: "Manual Approval"
    needs: publish
    uses: ./.github/workflows/manual-approval.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  # ── 9. DOWNLOAD PLAN ─────────────────────────────────────────────────────
  download:
    name: "Download Plan"
    needs: approval
    uses: ./.github/workflows/download-plan.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 10. APPLY ────────────────────────────────────────────────────────────
  apply:
    name: "Apply"
    needs: download
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit
