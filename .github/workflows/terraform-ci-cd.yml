name: Terraform Enterprise Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - preprod
          - prod
      working_directory:
        description: "Terraform working directory (relative to repo root)"
        required: false
        default: "."
        type: string

permissions:
  id-token: write       # Required for OIDC token to authenticate with Azure
  contents: read        # Required to checkout repository code
  pull-requests: write  # Required to post plan comments on PRs

# ──────────────────────────────────────────────────────────────────────────────
# Environment-specific variable matrix
# These values are resolved by each template via the `environment` input.
# Actual secret values (client-id, subscription-id, etc.) are stored in
# GitHub Environments and accessed via secrets.
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. SETUP: Install Terraform & Azure login ────────────────────────────
  setup:
    name: "Setup"
    uses: ./.github/workflows/setup-terraform.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 2. INIT: Terraform init with environment backend ─────────────────────
  init:
    name: "Init"
    needs: setup
    uses: ./.github/workflows/terraform-init.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 3. VALIDATE: fmt check + validate ────────────────────────────────────
  validate:
    name: "Validate"
    needs: init
    uses: ./.github/workflows/terraform-validate.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 4a. TFLINT: Linting ──────────────────────────────────────────────────
  tflint:
    name: "TFLint"
    needs: validate
    uses: ./.github/workflows/tflint.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 4b. TFSEC: Security scan ─────────────────────────────────────────────
  tfsec:
    name: "TFSec"
    needs: validate
    uses: ./.github/workflows/tfsec.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 4c. TERRASCAN: Compliance scan ───────────────────────────────────────
  terrascan:
    name: "Terrascan"
    needs: validate
    uses: ./.github/workflows/terrascan.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 4d. TERRAFORM TEST: Unit / integration tests ─────────────────────────
  test:
    name: "Terraform Test"
    needs: validate
    uses: ./.github/workflows/terraform-test.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 5. PLAN: Generate tfplan binary artifact ──────────────────────────────
  plan:
    name: "Plan"
    needs: [tflint, tfsec, terrascan, test]
    uses: ./.github/workflows/terraform-plan.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 6. PLAN → JSON: Convert binary plan to JSON for policy evaluation ─────
  plan-to-json:
    name: "Plan to JSON"
    needs: plan
    uses: ./.github/workflows/plan-to-json.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 7. OPA: Policy-as-code validation on tfplan.json ─────────────────────
  opa:
    name: "OPA Policy Validation"
    needs: plan-to-json
    uses: ./.github/workflows/opa-validation.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 8. PUBLISH: Post plan + OPA results as PR comment / summary ──────────
  publish:
    name: "Publish Results"
    needs: opa
    uses: ./.github/workflows/publish-results.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 9. MANUAL APPROVAL: Human gate before apply ──────────────────────────
  approval:
    name: "Manual Approval"
    needs: publish
    uses: ./.github/workflows/manual-approval.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  # ── 10. DOWNLOAD: Retrieve approved tfplan artifact ───────────────────────
  download:
    name: "Download Plan"
    needs: approval
    uses: ./.github/workflows/download-plan.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit

  # ── 11. APPLY: Apply only on main branch ─────────────────────────────────
  apply:
    name: "Apply"
    needs: download
    # Guard: apply runs ONLY when triggered from the main branch
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets: inherit
