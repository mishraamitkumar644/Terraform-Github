name: "Setup Terraform"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev | qa | preprod | prod)"
      working_directory:
        required: false
        type: string
        default: "."
    secrets:
      # OIDC / Azure credentials — stored per GitHub Environment
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  setup:
    name: "Setup (${{ inputs.environment }})"
    runs-on: [self-hosted, linux, terraform]
    environment: ${{ inputs.environment }}   # Activates env-scoped secrets

    steps:
      # ── Checkout source code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install Terraform (version pinned via .terraform-version or input) ─
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"          # Update to match your required version
          terraform_wrapper: true

      # ── OIDC: Authenticate to Azure (no long-lived secrets stored) ────────
      # Requires Federated Credential configured on the App Registration:
      #   subject: repo:<org>/<repo>:environment:<env>
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Verify Azure identity ─────────────────────────────────────────────
      - name: Verify Azure identity
        run: az account show --output table
