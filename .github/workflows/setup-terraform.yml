name: "Setup Terraform"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev | qa | prod)"
      working_directory:
        required: false
        type: string
        default: "."
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  setup:
    name: "Setup (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false   # wrapper must be false to preserve exit codes in plan/apply

      # ── OIDC: Authenticate to Azure (no long-lived secrets stored) ────────
      # Federated Credential subject for env-scoped jobs:
      #   repo:<org>/<repo>:environment:<env>
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure identity
        run: az account show --output table
