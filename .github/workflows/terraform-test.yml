name: "Terraform Test"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TF_BACKEND_RESOURCE_GROUP:
        required: true
      TF_BACKEND_STORAGE_ACCOUNT:
        required: true
      TF_BACKEND_CONTAINER:
        required: true

jobs:
  test:
    name: "Terraform Test (${{ inputs.environment }})"
    runs-on: [self-hosted, linux, terraform]
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (for test modules)
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
            -input=false \
            -reconfigure

      # ── Run Terraform native tests (.tftest.hcl files) ────────────────────
      - name: Terraform Test
        run: |
          terraform test \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -no-color \
            -verbose

      # ── Upload test results ───────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-test-results-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/**/*.tftest.hcl
          if-no-files-found: ignore
          retention-days: 7
