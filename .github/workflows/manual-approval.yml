name: "Manual Approval"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Environment to gate approval for (maps to a GitHub Environment with required reviewers)"

jobs:
  approval:
    name: "Awaiting Approval (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    # ── KEY FIX: environment is dynamic, not hardcoded to 'prod' ──────────
    # Configure required reviewers per environment in:
    #   GitHub → Settings → Environments → <env> → Required reviewers
    # The job will pause here until a reviewer approves or rejects.
    environment: ${{ inputs.environment }}

    steps:
      - name: Approval checkpoint
        run: |
          echo "========================================"
          echo "Manual approval granted."
          echo "  Environment : ${{ inputs.environment }}"
          echo "  Approved by : ${{ github.actor }}"
          echo "  Run ID      : ${{ github.run_id }}"
          echo "========================================"
          echo "Proceeding to download plan and apply..."
