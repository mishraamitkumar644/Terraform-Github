name: "Publish Results"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  publish:
    name: "Publish Results (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download plan output artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}

      - name: Download OPA results artifact
        uses: actions/download-artifact@v4
        with:
          name: opa-results-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}

      - name: Publish Job Summary
        run: |
          echo "## Terraform Pipeline Summary — \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat plan-output.txt >> $GITHUB_STEP_SUMMARY || echo "(plan output not available)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "### OPA Policy Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat opa-results.json | jq '.' >> $GITHUB_STEP_SUMMARY || echo "(OPA results not available)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.existsSync('plan-output.txt')
              ? fs.readFileSync('plan-output.txt', 'utf8').slice(0, 60000)
              : '(not available)';
            const opaOutput = fs.existsSync('opa-results.json')
              ? JSON.stringify(JSON.parse(fs.readFileSync('opa-results.json', 'utf8')), null, 2).slice(0, 10000)
              : '(not available)';
            const body = [
              `## Terraform Plan — \`${{ inputs.environment }}\``,
              `**Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `**Triggered by:** @${{ github.actor }}`,
              '',
              '<details><summary>Terraform Plan</summary>',
              '',
              '```',
              planOutput,
              '```',
              '</details>',
              '',
              '<details><summary>OPA Policy Results</summary>',
              '',
              '```json',
              opaOutput,
              '```',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
