name: "Download Plan"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  download:
    name: "Download Plan (${{ inputs.environment }})"
    runs-on: [self-hosted, linux, terraform]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # ── Download the approved tfplan binary from artifact store ──────────
      # This is the same plan that was validated by OPA and reviewed in the
      # publish step — guarantees no drift between approval and apply.
      - name: Download approved tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}

      # ── Verify artifact integrity ─────────────────────────────────────────
      - name: Verify tfplan artifact
        run: |
          if [ ! -f "tfplan" ]; then
            echo "::error::tfplan binary not found after download. Aborting."
            exit 1
          fi
          echo "tfplan artifact verified:"
          ls -lh tfplan
          echo "SHA256: $(sha256sum tfplan)"

      # ── Re-upload with apply-ready label so apply job can locate it ───────
      - name: Re-upload approved tfplan for apply
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-approved-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1       # Short TTL — apply must run immediately after
          if-no-files-found: error
