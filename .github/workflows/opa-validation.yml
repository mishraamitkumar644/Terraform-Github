name: "OPA Policy Validation"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  opa:
    name: "OPA Validation (${{ inputs.environment }})"
    runs-on: [self-hosted, linux, terraform]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Download tfplan JSON generated in previous job ────────────────────
      - name: Download tfplan JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}

      # ── Run OPA policy evaluation ─────────────────────────────────────────
      # policies/ dir is always at repo root ($GITHUB_WORKSPACE/policies)
      # regardless of working_directory — so we always use the absolute path.
      - name: OPA Evaluate - deny rules
        run: |
          DENY_OUTPUT=$(opa eval \
            --data "$GITHUB_WORKSPACE/policies" \
            --input tfplan.json \
            --format raw \
            'data.terraform.deny')

          echo "OPA deny results:"
          echo "$DENY_OUTPUT"

          DENY_COUNT=$(echo "$DENY_OUTPUT" | jq 'if type == "array" then length else 0 end')
          if [ "$DENY_COUNT" -gt 0 ]; then
            echo "::error::OPA policy violations found ($DENY_COUNT violations). Review the deny output above."
            exit 1
          fi
          echo "OPA validation passed. No policy violations."

      # ── Evaluate warn rules (non-blocking) ───────────────────────────────
      - name: OPA Evaluate - warn rules
        run: |
          WARN_OUTPUT=$(opa eval \
            --data "$GITHUB_WORKSPACE/policies" \
            --input tfplan.json \
            --format raw \
            'data.terraform.warn' 2>/dev/null || echo "[]")

          WARN_COUNT=$(echo "$WARN_OUTPUT" | jq 'if type == "array" then length else 0 end')
          if [ "$WARN_COUNT" -gt 0 ]; then
            echo "::warning::OPA policy warnings ($WARN_COUNT). Review before apply:"
            echo "$WARN_OUTPUT"
          fi

      # ── Save OPA results for publish job ─────────────────────────────────
      - name: Save OPA results
        if: always()
        run: |
          opa eval \
            --data "$GITHUB_WORKSPACE/policies" \
            --input tfplan.json \
            --format json \
            'data.terraform' > opa-results.json || echo '{"error":"opa eval failed"}' > opa-results.json

      - name: Upload OPA results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-results-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/opa-results.json
          retention-days: 7
