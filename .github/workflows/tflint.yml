name: "TFLint"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  tflint:
    name: "TFLint (${{ inputs.environment }})"
    runs-on: [self-hosted, linux, terraform]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Initialize TFLint with plugins (reads .tflint.hcl if present) ────
      - name: TFLint Init
        run: tflint --init

      # ── Run lint checks across all Terraform files ────────────────────────
      # Note: tflint does NOT accept --var-file. Variable values are not
      # needed for linting — tflint checks rules, not runtime values.
      - name: TFLint Run
        run: |
          tflint \
            --format compact \
            --recursive

      # ── Upload lint report as artifact ────────────────────────────────────
      - name: Upload TFLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tflint-report.*
          if-no-files-found: ignore
          retention-days: 7
