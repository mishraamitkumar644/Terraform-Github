name: "TFLint"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."

jobs:
  tflint:
    name: "TFLint (${{ inputs.environment }})"
    runs-on: [self-hosted, linux, terraform]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Initialize TFLint with plugins (reads .tflint.hcl if present) ────
      - name: TFLint Init
        run: tflint --init

      # ── Run lint checks across all Terraform files ────────────────────────
      - name: TFLint Run
        run: |
          tflint \
            --format compact \
            --var-file="environments/${{ inputs.environment }}.tfvars" \
            --recursive

      # ── Upload lint report as artifact ────────────────────────────────────
      - name: Upload TFLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tflint-report.* 
          if-no-files-found: ignore
          retention-days: 7
